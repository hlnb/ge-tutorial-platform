        <path d="M 360 850 L 360 880" stroke="#87bba2" stroke-width="7" stroke-linecap="round" /><path d="M 340 862 L 360 880 L 340 898" fill="none" stroke="#87bba2" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
