<svg width="1080" height="1350" viewBox="0 0 1080 1350" version="1.1" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">How to Read a Design slide 4</title>
  <desc id="desc">Extract design decisions. Colours, type scale, alignment, and spacing are implementation clues.</desc>
