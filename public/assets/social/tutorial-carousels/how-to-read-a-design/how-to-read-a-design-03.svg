  <title id="title">How to Read a Design slide 3</title>
  <desc id="desc">Notice repeated patterns. Cards, buttons, headings, spacing, and content rhythm tell you what should become reusable.</desc>
  <rect width="1080" height="1350" fill="#fff9fb" />
  <rect x="40" y="40" width="1000" height="1270" rx="8" fill="#ffffff" />
  
    <g id="brand-header">
      <text x="90" y="104" font-family="PT Sans, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="0" fill="#4d4d4d">graphit<tspan fill="#8d0000">Edge</tspan></text>
      <rect x="90" y="132" width="900" height="2" fill="#d3d4d9" />
      <text x="90" y="182" font-family="PT Sans, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="0" fill="#8d0000">From Design to Website</text>
      <text x="990" y="182" text-anchor="end" font-family="PT Sans, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="0" fill="#4d4d4d">3/6</text>
    </g>
  
  
  <g id="message">
    <text x="90" y="306" text-anchor="start" font-family="Raleway, Arial, sans-serif" font-size="68" font-weight="700" letter-spacing="0" fill="#242424">Notice repeated</text>
<text x="90" y="382.16" text-anchor="start" font-family="Raleway, Arial, sans-serif" font-size="68" font-weight="700" letter-spacing="0" fill="#242424">patterns.</text>
    <text x="92" y="510" text-anchor="start" font-family="PT Sans, Arial, sans-serif" font-size="38" font-weight="400" letter-spacing="0" fill="#4d4d4d">Cards, buttons, headings, spacing, and</text>
<text x="92" y="560.16" text-anchor="start" font-family="PT Sans, Arial, sans-serif" font-size="38" font-weight="400" letter-spacing="0" fill="#4d4d4d">content rhythm tell you what should become</text>
<text x="92" y="560.16" text-anchor="start" font-family="PT Sans, Arial, sans-serif" font-size="38" font-weight="400" letter-spacing="0" fill="#4d4d4d">reusable.</text>
  </g>
