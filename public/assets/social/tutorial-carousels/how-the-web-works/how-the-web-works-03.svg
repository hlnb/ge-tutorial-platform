<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="1350" viewBox="0 0 1080 1350" version="1.1" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">How the Web Actually Works slide 3</title>
  <desc id="desc">A server receives the request. The server decides what files or data should be sent back.</desc>
  <rect width="1080" height="1350" fill="#fff9fb" />
  <rect x="40" y="40" width="1000" height="1270" rx="8" fill="#ffffff" />
  
    <g id="brand-header">
      <text x="90" y="104" font-family="PT Sans, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="0" fill="#4d4d4d">graphit<tspan fill="#8d0000">Edge</tspan></text>
      <rect x="90" y="132" width="900" height="2" fill="#d3d4d9" />
      <text x="90" y="182" font-family="PT Sans, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="0" fill="#8d0000">Understand the Web</text>
      <text x="990" y="182" text-anchor="end" font-family="PT Sans, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="0" fill="#4d4d4d">3/6</text>
    </g>
  
  
  <g id="message">
    <text x="90" y="306" text-anchor="start" font-family="Raleway, Arial, sans-serif" font-size="68" font-weight="700" letter-spacing="0" fill="#242424">A server receives the</text>
<text x="90" y="382.16" text-anchor="start" font-family="Raleway, Arial, sans-serif" font-size="68" font-weight="700" letter-spacing="0" fill="#242424">request.</text>
    <text x="92" y="510" text-anchor="start" font-family="PT Sans, Arial, sans-serif" font-size="38" font-weight="400" letter-spacing="0" fill="#4d4d4d">The server decides what files or data</text>
<text x="92" y="560.16" text-anchor="start" font-family="PT Sans, Arial, sans-serif" font-size="38" font-weight="400" letter-spacing="0" fill="#4d4d4d">should be sent back.</text>
  </g>
  <g id="visual">
    
        <rect x="250" y="750" width="580" height="250" rx="8" fill="#fff9fb" stroke="#d3d4d9" stroke-width="3" />
        <rect x="315" y="810" width="450" height="36" rx="6" fill="#8d0000" opacity="0.88" />
        <rect x="315" y="870" width="450" height="36" rx="6" fill="#4b88a2" opacity="0.72" />
        <rect x="315" y="930" width="450" height="36" rx="6" fill="#87bba2" opacity="0.72" />
        <text x="540" y="1050" text-anchor="middle" font-family="PT Sans, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="0" fill="#4d4d4d">Files and responses live here</text>
      
  </g>
  
