<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="1350" viewBox="0 0 1080 1350" version="1.1" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Git &amp; GitHub Basics slide 2</title>
  <desc id="desc">A commit is a saved checkpoint. It records a meaningful moment in your project history.</desc>
  <rect width="1080" height="1350" fill="#fff9fb" />
  <rect x="40" y="40" width="1000" height="1270" rx="8" fill="#ffffff" />
  
    <g id="brand-header">
      <text x="90" y="104" font-family="PT Sans, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="0" fill="#4d4d4d">graphit<tspan fill="#8d0000">Edge</tspan></text>
      <rect x="90" y="132" width="900" height="2" fill="#d3d4d9" />
      <text x="90" y="182" font-family="PT Sans, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="0" fill="#8d0000">Make It Live</text>
      <text x="990" y="182" text-anchor="end" font-family="PT Sans, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="0" fill="#4d4d4d">2/6</text>
    </g>
  
  
  <g id="message">
    <text x="90" y="306" text-anchor="start" font-family="Raleway, Arial, sans-serif" font-size="68" font-weight="700" letter-spacing="0" fill="#242424">A commit is a saved</text>
<text x="90" y="382.16" text-anchor="start" font-family="Raleway, Arial, sans-serif" font-size="68" font-weight="700" letter-spacing="0" fill="#242424">checkpoint.</text>
    <text x="92" y="510" text-anchor="start" font-family="PT Sans, Arial, sans-serif" font-size="38" font-weight="400" letter-spacing="0" fill="#4d4d4d">It records a meaningful moment in your</text>
<text x="92" y="560.16" text-anchor="start" font-family="PT Sans, Arial, sans-serif" font-size="38" font-weight="400" letter-spacing="0" fill="#4d4d4d">project history.</text>
  </g>
  <g id="visual">
    
        <path d="M 190 890 H 890" stroke="#d3d4d9" stroke-width="10" stroke-linecap="round" />
