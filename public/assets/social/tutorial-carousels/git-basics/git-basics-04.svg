<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="1350" viewBox="0 0 1080 1350" version="1.1" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Git &amp; GitHub Basics slide 4</title>
  <desc id="desc">A merge brings finished work together. When the branch is ready, you combine it back into the main line of work.</desc>
  <rect width="1080" height="1350" fill="#fff9fb" />
  <rect x="40" y="40" width="1000" height="1270" rx="8" fill="#ffffff" />
  
    <g id="brand-header">
      <text x="90" y="104" font-family="PT Sans, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="0" fill="#4d4d4d">graphit<tspan fill="#8d0000">Edge</tspan></text>
      <rect x="90" y="132" width="900" height="2" fill="#d3d4d9" />
      <text x="90" y="182" font-family="PT Sans, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="0" fill="#8d0000">Make It Live</text>
      <text x="990" y="182" text-anchor="end" font-family="PT Sans, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="0" fill="#4d4d4d">4/6</text>
    </g>
  
  
  <g id="message">
    <text x="90" y="306" text-anchor="start" font-family="Raleway, Arial, sans-serif" font-size="68" font-weight="700" letter-spacing="0" fill="#242424">A merge brings finished</text>
<text x="90" y="382.16" text-anchor="start" font-family="Raleway, Arial, sans-serif" font-size="68" font-weight="700" letter-spacing="0" fill="#242424">work together.</text>
    <text x="92" y="510" text-anchor="start" font-family="PT Sans, Arial, sans-serif" font-size="38" font-weight="400" letter-spacing="0" fill="#4d4d4d">When the branch is ready, you combine it</text>
<text x="92" y="560.16" text-anchor="start" font-family="PT Sans, Arial, sans-serif" font-size="38" font-weight="400" letter-spacing="0" fill="#4d4d4d">back into the main line of work.</text>
  </g>
  <g id="visual">
    
        <path d="M 210 930 H 520 C 650 930, 650 810, 820 810" fill="none" stroke="#4b88a2" stroke-width="10" stroke-linecap="round" />
        <path d="M 210 930 H 520 C 650 930, 650 1010, 820 1010" fill="none" stroke="#87bba2" stroke-width="10" stroke-linecap="round" />
        <path d="M 830 910 L 920 910" stroke="#8d0000" stroke-width="7" stroke-linecap="round" /><path d="M 900 892 L 920 910 L 900 928" fill="none" stroke="#8d0000" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
        <text x="540" y="1100" text-anchor="middle" font-family="PT Sans, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="0" fill="#4d4d4d">bring finished work together</text>
      
  </g>
  
