        <rect x="160" y="800" width="250" height="180" rx="8" fill="#ffffff" stroke="#d3d4d9" stroke-width="3" />
        <rect x="670" y="800" width="250" height="180" rx="8" fill="#fff9fb" stroke="#d3d4d9" stroke-width="3" />
        <path d="M 430 890 L 640 890" stroke="#8d0000" stroke-width="7" stroke-linecap="round" /><path d="M 620 872 L 640 890 L 620 908" fill="none" stroke="#8d0000" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
        <text x="285" y="910" text-anchor="middle" font-family="PT Sans, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="0" fill="#4d4d4d">local</text>
        <text x="795" y="910" text-anchor="middle" font-family="PT Sans, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="0" fill="#4d4d4d">remote</text>
      
  </g>
  
