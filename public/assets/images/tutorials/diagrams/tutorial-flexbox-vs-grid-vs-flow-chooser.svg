<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" role="img" aria-labelledby="title desc">
  <title id="title">Flexbox versus Grid versus normal flow chooser</title>
  <desc id="desc">A comparison guide explains when to use normal flow, Flexbox, or Grid based on whether content stacks naturally, needs one-direction alignment, or requires rows and columns together.</desc>
  <defs><style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}.title{font-size:28px;font-weight:700}.subtitle{font-size:16px;fill:#52606d}.label{font-size:16px;font-weight:700}.small{font-size:13px;fill:#52606d}.panel{fill:#fff;stroke:#cbd2d9;stroke-width:2}
  </style></defs>
  <rect width="960" height="440" fill="#f8fafb"/>
  <text x="60" y="56" class="title">When Flexbox Is the Wrong Tool</text>
  <text x="60" y="84" class="subtitle">Choose the layout method that matches the shape of the content.</text>
  <rect x="60" y="130" width="260" height="240" rx="16" class="panel"/><text x="190" y="162" text-anchor="middle" class="label">Normal flow</text><text x="190" y="208" text-anchor="middle" class="small">Use when content can stack</text><text x="190" y="230" text-anchor="middle" class="small">naturally without much alignment.</text>
  <rect x="350" y="130" width="260" height="240" rx="16" class="panel"/><text x="480" y="162" text-anchor="middle" class="label">Flexbox</text><text x="480" y="208" text-anchor="middle" class="small">Use when the main job happens</text><text x="480" y="230" text-anchor="middle" class="small">in one direction at a time.</text>
  <rect x="640" y="130" width="260" height="240" rx="16" class="panel"/><text x="770" y="162" text-anchor="middle" class="label">Grid</text><text x="770" y="208" text-anchor="middle" class="small">Use when repeated content needs</text><text x="770" y="230" text-anchor="middle" class="small">rows and columns together.</text>
</svg>
