<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Pre-launch checklist funnel</title>
  <desc id="desc">A funnel diagram showing many QA findings being sorted into blockers, fixes before launch, deferred improvements, and ready to launch.</desc>
  <rect width="960" height="540" fill="#f8fafb"/>
  <text x="480" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#102a43">A Checklist Turns Findings into Decisions</text>
  <text x="480" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#52606d">The point is not to collect warnings. The point is to decide what must happen next.</text>

  <path d="M190 135 H770 L640 335 H320 Z" fill="#ffffff" stroke="#bcccdc" stroke-width="2"/>
  <path d="M320 335 H640 L585 425 H375 Z" fill="#e0f2fe" stroke="#7cc4fa" stroke-width="2"/>
  <rect x="345" y="425" width="270" height="62" rx="31" fill="#fff7ed" stroke="#f0b429" stroke-width="2"/>

  <g font-family="Arial, sans-serif">
    <text x="480" y="172" text-anchor="middle" font-size="23" font-weight="700" fill="#102a43">Raw QA findings</text>
    <text x="480" y="203" text-anchor="middle" font-size="16" fill="#52606d">validator errors, Lighthouse notes, broken links, layout issues, copy checks</text>

    <line x1="252" y1="232" x2="708" y2="232" stroke="#d9e2ec" stroke-width="2"/>
    <text x="480" y="267" text-anchor="middle" font-size="22" font-weight="700" fill="#102a43">Sort by risk</text>
    <text x="480" y="297" text-anchor="middle" font-size="16" fill="#52606d">blocking issue, fix before launch, defer with notes</text>

    <text x="480" y="383" text-anchor="middle" font-size="22" font-weight="700" fill="#102a43">Known launch state</text>
    <text x="480" y="462" text-anchor="middle" font-size="22" font-weight="700" fill="#102a43">Ready to launch</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="15" fill="#52606d">
    <rect x="92" y="160" width="118" height="38" rx="19" fill="#fef2f2" stroke="#f5b7b1"/>
    <text x="151" y="184" text-anchor="middle">Broken link</text>
    <rect x="735" y="160" width="140" height="38" rx="19" fill="#fef2f2" stroke="#f5b7b1"/>
    <text x="805" y="184" text-anchor="middle">Missing label</text>
    <rect x="82" y="270" width="150" height="38" rx="19" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="157" y="294" text-anchor="middle">Slow image</text>
    <rect x="720" y="270" width="155" height="38" rx="19" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="797" y="294" text-anchor="middle">Awkward mobile</text>
    <rect x="72" y="382" width="175" height="38" rx="19" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="160" y="406" text-anchor="middle">Copy polish note</text>
    <rect x="710" y="382" width="178" height="38" rx="19" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="799" y="406" text-anchor="middle">Future enhancement</text>
  </g>

  <path d="M210 180 C280 185 330 190 385 207" fill="none" stroke="#9fb3c8" stroke-width="3"/>
  <path d="M735 180 C670 185 620 190 575 207" fill="none" stroke="#9fb3c8" stroke-width="3"/>
  <path d="M232 290 C310 288 360 296 405 318" fill="none" stroke="#9fb3c8" stroke-width="3"/>
  <path d="M720 290 C650 290 600 300 555 318" fill="none" stroke="#9fb3c8" stroke-width="3"/>
</svg>
