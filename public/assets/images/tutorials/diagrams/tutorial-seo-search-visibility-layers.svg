<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Search visibility layers</title>
  <desc id="desc">A layered diagram showing crawlability, page meaning, content quality, page experience, and search presentation supporting findability.</desc>
  <rect width="960" height="540" fill="#f8fafb"/>
  <text x="480" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#102a43">Search Visibility Is Built in Layers</text>
  <text x="480" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#52606d">SEO works best when technical access, meaning, content, and experience support each other.</text>

  <g font-family="Arial, sans-serif">
    <rect x="170" y="390" width="620" height="70" rx="14" fill="#d9e2ec" stroke="#9fb3c8" stroke-width="2"/>
    <text x="480" y="433" text-anchor="middle" font-size="22" font-weight="700" fill="#102a43">Crawlable and indexable page</text>

    <rect x="210" y="320" width="540" height="70" rx="14" fill="#e0f2fe" stroke="#7cc4fa" stroke-width="2"/>
    <text x="480" y="363" text-anchor="middle" font-size="22" font-weight="700" fill="#102a43">Clear HTML structure and metadata</text>

    <rect x="250" y="250" width="460" height="70" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
    <text x="480" y="293" text-anchor="middle" font-size="22" font-weight="700" fill="#102a43">Helpful, original content</text>

    <rect x="290" y="180" width="380" height="70" rx="14" fill="#fff7ed" stroke="#f0b429" stroke-width="2"/>
    <text x="480" y="223" text-anchor="middle" font-size="22" font-weight="700" fill="#102a43">Good page experience</text>

    <rect x="330" y="110" width="300" height="70" rx="14" fill="#fef2f2" stroke="#f5b7b1" stroke-width="2"/>
    <text x="480" y="153" text-anchor="middle" font-size="22" font-weight="700" fill="#102a43">Useful search result</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="15" fill="#52606d">
    <text x="815" y="430">Can Google access it?</text>
    <text x="775" y="360">Can systems understand it?</text>
    <text x="735" y="290">Does it answer a real need?</text>
    <text x="695" y="220">Can people use it easily?</text>
    <text x="655" y="150">Does the result set clear expectations?</text>
  </g>
</svg>
