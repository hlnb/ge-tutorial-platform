<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" role="img" aria-labelledby="title desc">
  <title id="title">Responsive component behaviour</title>
  <desc id="desc">A call-to-action component changing from side-by-side layout to wrapped layout to stacked layout as available space narrows.</desc>
  <defs>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}.title{font-size:28px;font-weight:700}.subtitle{font-size:16px;fill:#52606d}.label{font-size:16px;font-weight:700}.small{font-size:13px;fill:#52606d}.stage{fill:#fff;stroke:#cbd2d9;stroke-width:2}.cta{fill:#fffaf0;stroke:#d8c6b0;stroke-width:2}.text{fill:#d6e8ef}.button{fill:#8f2f23}.muted{fill:#e5e7eb}.arrow{stroke:#4b88a2;stroke-width:4;fill:none;marker-end:url(#arrowhead)}
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4b88a2"/>
    </marker>
  </defs>
  <rect width="960" height="440" fill="#f8fafb"/>
  <text x="60" y="54" class="title">Plan the Component Behaviour</text>
  <text x="60" y="82" class="subtitle">Responsive refinement is a behaviour plan: stretch, wrap, then stack when needed.</text>

  <rect x="60" y="132" width="270" height="210" rx="18" class="stage"/>
  <text x="195" y="164" text-anchor="middle" class="label">Wide: side by side</text>
  <rect x="90" y="205" width="210" height="78" rx="14" class="cta"/>
  <rect x="112" y="226" width="112" height="12" rx="6" class="text"/>
  <rect x="112" y="248" width="90" height="9" rx="5" class="muted"/>
  <rect x="238" y="233" width="42" height="24" rx="10" class="button"/>
  <text x="195" y="316" text-anchor="middle" class="small">Use the available horizontal room.</text>

  <path d="M342 238 C368 238 384 238 410 238" class="arrow"/>

  <rect x="425" y="132" width="210" height="210" rx="18" class="stage"/>
  <text x="530" y="164" text-anchor="middle" class="label">Medium: wrap</text>
  <rect x="468" y="198" width="124" height="96" rx="14" class="cta"/>
  <rect x="488" y="219" width="84" height="12" rx="6" class="text"/>
  <rect x="488" y="241" width="72" height="9" rx="5" class="muted"/>
  <rect x="488" y="263" width="56" height="20" rx="10" class="button"/>
  <text x="530" y="316" text-anchor="middle" class="small">Let pieces wrap before they break.</text>

  <path d="M648 238 C674 238 690 238 716 238" class="arrow"/>

  <rect x="730" y="132" width="170" height="210" rx="18" class="stage"/>
  <text x="815" y="164" text-anchor="middle" class="label">Narrow: stack</text>
  <rect x="778" y="195" width="74" height="102" rx="14" class="cta"/>
  <rect x="791" y="216" width="48" height="12" rx="6" class="text"/>
  <rect x="791" y="240" width="42" height="9" rx="5" class="muted"/>
  <rect x="791" y="265" width="48" height="22" rx="10" class="button"/>
  <text x="815" y="316" text-anchor="middle" class="small">Choose the clearest shape.</text>
</svg>
