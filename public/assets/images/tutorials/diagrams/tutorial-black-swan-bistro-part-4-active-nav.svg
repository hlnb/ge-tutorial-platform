<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" role="img" aria-labelledby="title desc">
  <title id="title">Active navigation state for the current page</title>
  <desc id="desc">Two navigation bars side by side: one showing the menu page with the Menu link highlighted, and one
    showing the about page with the About link highlighted. Annotations explain that the active class marks which page
    the visitor is on.</desc>
  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #1f2933
      }

      .heading {
        font-size: 24px;
        font-weight: 700
      }

      .subtitle {
        font-size: 15px;
        fill: #52606d
      }

      .label {
        font-size: 15px;
        font-weight: 700
      }

      .small {
        font-size: 13px;
        fill: #52606d
      }

      .nav-bg {
        fill: #1f1b18;
        rx: 10
      }

      .nav-link {
        font-size: 14px;
        fill: #f7efe2;
        font-weight: 500
      }

      .active-link {
        font-size: 14px;
        fill: #f7efe2;
        font-weight: 700
      }

      .active-underline {
        stroke: #8f2f23;
        stroke-width: 3;
        stroke-linecap: round
      }

      .annotation {
        fill: #f0f4f8;
        stroke: #8f2f23;
        stroke-width: 1.5;
        rx: 8
      }

      .page-label {
        font-size: 18px;
        font-weight: 700;
        fill: #52606d
      }
    </style>
  </defs>

  <rect width="960" height="380" fill="#f8fafb" />
  <text x="480" y="40" text-anchor="middle" class="heading">Active Navigation States</text>
  <text x="480" y="64" text-anchor="middle" class="subtitle">The current page gets a visual highlight so the visitor
    knows where they are.</text>

  <!-- Nav bar 1: Menu page active -->
  <text x="240" y="110" text-anchor="middle" class="page-label">On menu.html</text>
  <rect x="60" y="125" width="360" height="46" class="nav-bg" />
  <text x="100" y="153" class="nav-link">Home</text>
  <text x="170" y="153" class="active-link">Menu</text>
  <line x1="170" y1="160" x2="210" y2="160" class="active-underline" />
  <text x="250" y="153" class="nav-link">About</text>
  <text x="330" y="153" class="nav-link">Contact</text>

  <!-- Nav bar 2: About page active -->
  <text x="720" y="110" text-anchor="middle" class="page-label">On about.html</text>
  <rect x="540" y="125" width="360" height="46" class="nav-bg" />
  <text x="580" y="153" class="nav-link">Home</text>
  <text x="650" y="153" class="nav-link">Menu</text>
  <text x="730" y="153" class="active-link">About</text>
  <line x1="730" y1="160" x2="774" y2="160" class="active-underline" />
  <text x="810" y="153" class="nav-link">Contact</text>

  <!-- Annotation -->
  <rect x="180" y="210" width="600" height="76" class="annotation" />
  <text x="480" y="236" text-anchor="middle" class="small" style="font-weight:700;fill:#8f2f23">How does the browser
    know which link is active?</text>
  <text x="480" y="258" text-anchor="middle" class="small">You add a class like <tspan style="font-family:monospace">
      is-active</tspan> to the current page's nav link.</text>
  <text x="480" y="276" text-anchor="middle" class="small">The CSS for that class adds the underline and bold
    weight.</text>

  <!-- Code hint -->
  <rect x="220" y="310" width="520" height="44" rx="8" fill="#1f1b18" />
  <text x="240" y="337" style="font-family:monospace;font-size:13px;fill:#f7efe2">&lt;a class="site-nav__link <tspan
      fill="#f9a825">is-active</tspan>" href="menu.html"&gt;Menu&lt;/a&gt;</text>
</svg>