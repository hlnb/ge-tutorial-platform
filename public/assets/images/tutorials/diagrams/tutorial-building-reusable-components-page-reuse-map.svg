<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" role="img" aria-labelledby="title desc">
  <title id="title">Reusable components across pages</title>
  <desc id="desc">A map showing reusable navigation, cards, buttons, and footer groups used across a homepage, menu page, and contact page.</desc>
  <defs>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}.title{font-size:28px;font-weight:700}.subtitle{font-size:16px;fill:#52606d}.label{font-size:15px;font-weight:700}.small{font-size:12px;fill:#52606d}.page{fill:#fff;stroke:#cbd2d9;stroke-width:2}.block{fill:#f0f4f8;stroke:#9aa5b1;stroke-width:1.3}.nav{fill:#d6e8ef}.card{fill:#fff7ed}.button{fill:#dbeafe}.footer{fill:#e5e7eb}
    </style>
  </defs>
  <rect width="960" height="440" fill="#f8fafb"/>
  <text x="60" y="56" class="title">Reusable Pieces Travel Across Pages</text>
  <text x="60" y="84" class="subtitle">A component-style pattern earns its keep when the next page can use it too.</text>
  <g transform="translate(75 125)">
    <rect width="240" height="245" rx="16" class="page"/><text x="120" y="34" text-anchor="middle" class="label">Homepage</text>
    <rect x="28" y="58" width="184" height="24" rx="6" class="block nav"/><text x="120" y="75" text-anchor="middle" class="small">site nav</text>
    <rect x="28" y="105" width="184" height="36" rx="8" class="block"/><text x="120" y="128" text-anchor="middle" class="small">hero section</text>
    <rect x="28" y="162" width="54" height="42" rx="8" class="block card"/><rect x="93" y="162" width="54" height="42" rx="8" class="block card"/><rect x="158" y="162" width="54" height="42" rx="8" class="block card"/>
    <rect x="28" y="218" width="184" height="18" rx="6" class="block footer"/>
  </g>
  <g transform="translate(360 125)">
    <rect width="240" height="245" rx="16" class="page"/><text x="120" y="34" text-anchor="middle" class="label">Menu Page</text>
    <rect x="28" y="58" width="184" height="24" rx="6" class="block nav"/><text x="120" y="75" text-anchor="middle" class="small">same nav</text>
    <rect x="28" y="104" width="86" height="42" rx="8" class="block card"/><rect x="126" y="104" width="86" height="42" rx="8" class="block card"/>
    <rect x="28" y="160" width="86" height="42" rx="8" class="block card"/><rect x="126" y="160" width="86" height="42" rx="8" class="block card"/>
    <rect x="28" y="218" width="184" height="18" rx="6" class="block footer"/>
  </g>
  <g transform="translate(645 125)">
    <rect width="240" height="245" rx="16" class="page"/><text x="120" y="34" text-anchor="middle" class="label">Contact Page</text>
    <rect x="28" y="58" width="184" height="24" rx="6" class="block nav"/><text x="120" y="75" text-anchor="middle" class="small">same nav</text>
    <rect x="28" y="112" width="184" height="38" rx="8" class="block card"/><text x="120" y="136" text-anchor="middle" class="small">info card</text>
    <rect x="62" y="172" width="116" height="24" rx="12" class="block button"/><text x="120" y="189" text-anchor="middle" class="small">shared action</text>
    <rect x="28" y="218" width="184" height="18" rx="6" class="block footer"/>
  </g>
</svg>
