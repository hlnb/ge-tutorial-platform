<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">Black Swan Bistro pathway progression</title>
  <desc id="desc">A progression diagram maps Black Swan Bistro parts to the wider learning journey: structure, wireframe layout, repeated patterns, multi-page structure, deployment, and long-term improvement.</desc>
  <defs><style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}.title{font-size:28px;font-weight:700}.subtitle{font-size:16px;fill:#52606d}.label{font-size:15px;font-weight:700}.small{font-size:13px;fill:#52606d}.step{fill:#fff;stroke:#486581;stroke-width:2.5}.arrow{stroke:#486581;stroke-width:3;fill:none;marker-end:url(#m)}
  </style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#486581"/></marker></defs>
  <rect width="960" height="320" fill="#f8fafb"/>
  <text x="60" y="54" class="title">How Black Swan Bistro Fits the Journey</text>
  <text x="60" y="82" class="subtitle">The project grows one layer at a time instead of appearing fully formed.</text>
  <g transform="translate(70 148)">
    <rect x="0" y="0" width="120" height="70" rx="16" class="step"/><text x="60" y="28" text-anchor="middle" class="label">Part 1</text><text x="60" y="48" text-anchor="middle" class="small">semantic structure</text>
    <path d="M120 35H154" class="arrow"/>
    <rect x="154" y="0" width="120" height="70" rx="16" class="step"/><text x="214" y="28" text-anchor="middle" class="label">Part 2</text><text x="214" y="48" text-anchor="middle" class="small">wireframe layout</text>
    <path d="M274 35H308" class="arrow"/>
    <rect x="308" y="0" width="140" height="70" rx="16" class="step"/><text x="378" y="28" text-anchor="middle" class="label">Part 3</text><text x="378" y="48" text-anchor="middle" class="small">repeated patterns</text>
    <path d="M448 35H482" class="arrow"/>
    <rect x="482" y="0" width="140" height="70" rx="16" class="step"/><text x="552" y="28" text-anchor="middle" class="label">Part 4</text><text x="552" y="48" text-anchor="middle" class="small">multi-page structure</text>
    <path d="M622 35H656" class="arrow"/>
    <rect x="656" y="0" width="104" height="70" rx="16" class="step"/><text x="708" y="28" text-anchor="middle" class="label">Later</text><text x="708" y="48" text-anchor="middle" class="small">deployment</text>
    <path d="M760 35H794" class="arrow"/>
    <rect x="794" y="0" width="96" height="70" rx="16" class="step"/><text x="842" y="28" text-anchor="middle" class="label">Ongoing</text><text x="842" y="48" text-anchor="middle" class="small">care</text>
  </g>
</svg>
