<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Plain HTML deployment compared with Vite deployment</title>
  <desc id="desc">A side by side comparison showing plain HTML sites deploy the folder with index.html, while Vite sites run a build and deploy the dist folder.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2f4858"/>
    </marker>
  </defs>
  <rect width="1120" height="560" rx="28" fill="#f8fafb"/>
  <text x="560" y="56" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="700" fill="#172a3a">Plain files and Vite projects deploy differently</text>
  <text x="560" y="92" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" fill="#52606d">The goal is always a public folder the host can serve.</text>

  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <rect x="70" y="140" width="460" height="340" rx="22" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
    <text x="300" y="184" text-anchor="middle" font-size="24" font-weight="700" fill="#172a3a">Plain HTML, CSS and JavaScript</text>
    <rect x="120" y="220" width="160" height="160" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="200" y="254" text-anchor="middle" font-size="18" font-weight="700" fill="#155e75">my-website/</text>
    <text x="146" y="292" font-size="16" fill="#334155">index.html</text>
    <text x="146" y="322" font-size="16" fill="#334155">styles.css</text>
    <text x="146" y="352" font-size="16" fill="#334155">script.js</text>
    <path d="M300 300 H370" stroke="#2f4858" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="390" y="235" width="90" height="130" rx="12" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <text x="435" y="286" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">Upload</text>
    <text x="435" y="314" text-anchor="middle" font-size="15" fill="#166534">same</text>
    <text x="435" y="338" text-anchor="middle" font-size="15" fill="#166534">files</text>
    <text x="300" y="430" text-anchor="middle" font-size="17" fill="#52606d">Deploy the folder that contains index.html.</text>

    <rect x="590" y="140" width="460" height="340" rx="22" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
    <text x="820" y="184" text-anchor="middle" font-size="24" font-weight="700" fill="#172a3a">Vite project</text>
    <rect x="640" y="220" width="150" height="160" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="715" y="254" text-anchor="middle" font-size="18" font-weight="700" fill="#92400e">source/</text>
    <text x="666" y="292" font-size="16" fill="#334155">src/</text>
    <text x="666" y="322" font-size="16" fill="#334155">public/</text>
    <text x="666" y="352" font-size="16" fill="#334155">package.json</text>
    <path d="M810 300 H870" stroke="#2f4858" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="884" y="215" width="116" height="170" rx="14" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="942" y="254" text-anchor="middle" font-size="17" font-weight="700" fill="#5b21b6">Build</text>
    <text x="942" y="288" text-anchor="middle" font-size="15" fill="#5b21b6">npm run</text>
    <text x="942" y="312" text-anchor="middle" font-size="15" fill="#5b21b6">build</text>
    <text x="942" y="348" text-anchor="middle" font-size="17" font-weight="700" fill="#5b21b6">dist/</text>
    <text x="820" y="430" text-anchor="middle" font-size="17" fill="#52606d">Deploy the generated output, usually dist.</text>
  </g>
</svg>
