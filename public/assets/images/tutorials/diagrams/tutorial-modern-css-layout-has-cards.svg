<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">Content-aware cards with :has()</title>
  <desc id="desc">A diagram showing cards without images staying simple and cards with images changing into a media layout when :has(img) matches.</desc>
  <defs>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}.title{font-size:28px;font-weight:700}.subtitle{font-size:16px;fill:#52606d}.label{font-size:16px;font-weight:700}.small{font-size:13px;fill:#52606d}.panel{fill:#fff;stroke:#cbd2d9;stroke-width:2}.card{fill:#fff;stroke:#9aa5b1;stroke-width:2}.image{fill:#d6e8ef;stroke:#4b88a2;stroke-width:2}.line{fill:#cbd2d9}.accent{fill:#fff4d6;stroke:#d89b2b;stroke-width:2}.arrow{stroke:#738290;stroke-width:3;fill:none;marker-end:url(#arrowhead)}
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#738290"/>
    </marker>
  </defs>
  <rect width="960" height="500" fill="#f8fafb"/>
  <text x="60" y="56" class="title">:has() Lets CSS Notice the Content</text>
  <text x="60" y="84" class="subtitle">The card layout changes only when the card actually contains an image.</text>

  <rect x="70" y="126" width="370" height="300" rx="16" class="panel"/>
  <text x="255" y="162" text-anchor="middle" class="label">No image</text>
  <rect x="145" y="205" width="220" height="150" rx="16" class="card"/>
  <rect x="172" y="232" width="84" height="14" rx="7" class="accent"/>
  <rect x="172" y="264" width="150" height="18" rx="9" class="line"/>
  <rect x="172" y="298" width="118" height="12" rx="6" class="line"/>
  <rect x="172" y="326" width="88" height="12" rx="6" class="line"/>
  <text x="255" y="388" text-anchor="middle" class="small">Simple stacked card</text>

  <path d="M460 276 H505" class="arrow"/>

  <rect x="525" y="126" width="365" height="300" rx="16" class="panel"/>
  <text x="707" y="162" text-anchor="middle" class="label">:has(img)</text>
  <rect x="575" y="216" width="265" height="126" rx="16" class="card"/>
  <rect x="575" y="216" width="104" height="126" rx="16" class="image"/>
  <rect x="700" y="238" width="82" height="14" rx="7" class="accent"/>
  <rect x="700" y="270" width="106" height="18" rx="9" class="line"/>
  <rect x="700" y="304" width="92" height="12" rx="6" class="line"/>
  <text x="707" y="388" text-anchor="middle" class="small">Media layout only when image exists</text>
</svg>
