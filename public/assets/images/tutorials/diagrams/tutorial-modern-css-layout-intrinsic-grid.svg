<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">Intrinsic grid columns with auto-fit and minmax</title>
  <desc id="desc">A diagram comparing a hard breakpoint grid with an intrinsic grid that creates fewer columns as cards reach their minimum readable width.</desc>
  <defs>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}.title{font-size:28px;font-weight:700}.subtitle{font-size:16px;fill:#52606d}.label{font-size:16px;font-weight:700}.small{font-size:13px;fill:#52606d}.panel{fill:#fff;stroke:#cbd2d9;stroke-width:2}.card{fill:#f0f4f8;stroke:#9aa5b1;stroke-width:1.5}.good{fill:#d6e8ef;stroke:#4b88a2;stroke-width:1.5}.warn{fill:#fff4d6;stroke:#d89b2b;stroke-width:1.5}.rule{stroke:#738290;stroke-width:2;stroke-dasharray:7 7}
    </style>
  </defs>
  <rect width="960" height="500" fill="#f8fafb"/>
  <text x="60" y="56" class="title">Intrinsic Grids Avoid Breakpoint Pileups</text>
  <text x="60" y="84" class="subtitle">auto-fit and minmax() let the card minimum decide when the grid should create fewer columns.</text>

  <rect x="70" y="125" width="380" height="310" rx="16" class="panel"/>
  <text x="260" y="160" text-anchor="middle" class="label">Hard breakpoint</text>
  <text x="260" y="186" text-anchor="middle" class="small">Three columns suddenly become too tight</text>
  <rect x="115" y="225" width="82" height="116" rx="12" class="warn"/>
  <rect x="214" y="225" width="82" height="116" rx="12" class="warn"/>
  <rect x="313" y="225" width="82" height="116" rx="12" class="warn"/>
  <line x1="105" y1="372" x2="405" y2="372" class="rule"/>
  <text x="260" y="404" text-anchor="middle" class="small">Needs another media query</text>

  <rect x="510" y="125" width="380" height="310" rx="16" class="panel"/>
  <text x="700" y="160" text-anchor="middle" class="label">Intrinsic grid</text>
  <text x="700" y="186" text-anchor="middle" class="small">Cards wrap when they hit the minimum</text>
  <rect x="570" y="220" width="122" height="92" rx="12" class="good"/>
  <rect x="712" y="220" width="122" height="92" rx="12" class="good"/>
  <rect x="570" y="330" width="122" height="58" rx="12" class="good"/>
  <rect x="712" y="330" width="122" height="58" rx="12" class="good"/>
  <text x="700" y="420" text-anchor="middle" class="small">repeat(auto-fit, minmax(min(18rem, 100%), 1fr))</text>
</svg>
