<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Black Swan Bistro homepage wireframe</title>
  <desc id="desc">A low-fidelity homepage wireframe for Black Swan Bistro showing header, hero, featured dishes cards, about section, menu preview, gallery, booking call to action, location and hours, and footer.</desc>
  <defs><style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}.title{font-size:28px;font-weight:700}.subtitle{font-size:16px;fill:#52606d}.label{font-size:15px;font-weight:700}.small{font-size:13px;fill:#52606d}.page{fill:#fff;stroke:#7b8794;stroke-width:2.5}.section{fill:#f0f4f8;stroke:#9aa5b1;stroke-width:2}
  </style></defs>
  <rect width="960" height="520" fill="#f8fafb"/>
  <text x="60" y="56" class="title">Black Swan Bistro Homepage Wireframe</text>
  <text x="60" y="84" class="subtitle">Low-fidelity layout first. Polish later.</text>
  <rect x="150" y="120" width="660" height="340" rx="16" class="page"/>
  <rect x="180" y="148" width="600" height="30" rx="8" class="section"/><text x="480" y="168" text-anchor="middle" class="label">Header: logo + navigation</text>
  <rect x="180" y="190" width="600" height="60" rx="12" class="section"/><text x="480" y="224" text-anchor="middle" class="label">Hero: title + intro + button</text>
  <rect x="180" y="262" width="188" height="54" rx="12" class="section"/><rect x="386" y="262" width="188" height="54" rx="12" class="section"/><rect x="592" y="262" width="188" height="54" rx="12" class="section"/>
  <text x="480" y="334" text-anchor="middle" class="small">Featured dishes cards</text>
  <rect x="180" y="350" width="290" height="46" rx="10" class="section"/><text x="325" y="378" text-anchor="middle" class="small">About section</text>
  <rect x="490" y="350" width="290" height="46" rx="10" class="section"/><text x="635" y="378" text-anchor="middle" class="small">Menu preview</text>
  <rect x="180" y="410" width="190" height="22" rx="8" class="section"/><rect x="390" y="410" width="190" height="22" rx="8" class="section"/><rect x="600" y="410" width="180" height="22" rx="8" class="section"/>
  <text x="480" y="454" text-anchor="middle" class="small">Gallery, booking CTA, location and hours continue below</text>
</svg>
