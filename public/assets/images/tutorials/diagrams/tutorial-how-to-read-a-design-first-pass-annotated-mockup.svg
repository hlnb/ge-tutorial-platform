<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">Annotated mockup first-pass reading diagram</title>
  <desc id="desc">A homepage-style mockup with numbered callouts marking the first pass reading order: main message, supporting content, repeated section, and footer. The diagram helps learners inspect a design in a sensible sequence.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2933; }
      .title { font-size: 28px; font-weight: 700; }
      .subtitle { font-size: 16px; fill: #52606d; }
      .label { font-size: 16px; font-weight: 700; }
      .small { font-size: 14px; fill: #52606d; }
      .panel { fill: #ffffff; stroke: #cbd2d9; stroke-width: 2; }
      .screen { fill: #ffffff; stroke: #7b8794; stroke-width: 2.5; }
      .hero { fill: #e7f3ea; stroke: #527a59; stroke-width: 2; }
      .section { fill: #dce8f7; stroke: #486581; stroke-width: 2; }
      .repeat { fill: #f7eadb; stroke: #9c6b30; stroke-width: 2; }
      .footer { fill: #e8ecef; stroke: #616e7c; stroke-width: 2; }
      .callout { fill: #486581; }
      .line { stroke: #486581; stroke-width: 2.5; fill: none; }
    </style>
  </defs>

  <rect width="960" height="620" fill="#f8fafb"/>
  <text x="60" y="60" class="title">First Pass: What Should You Notice First?</text>
  <text x="60" y="88" class="subtitle">Start with structure and attention, not tiny details.</text>

  <rect x="60" y="130" width="560" height="430" rx="16" class="screen"/>
  <rect x="92" y="160" width="496" height="42" rx="10" class="section"/>
  <text x="340" y="186" text-anchor="middle" class="label">Header and navigation</text>

  <rect x="92" y="220" width="496" height="104" rx="14" class="hero"/>
  <text x="340" y="266" text-anchor="middle" class="label">Hero headline and first action</text>
  <text x="340" y="288" text-anchor="middle" class="small">This is often where the eye goes first.</text>

  <rect x="92" y="342" width="496" height="78" rx="14" class="section"/>
  <text x="340" y="385" text-anchor="middle" class="label">Supporting section</text>

  <rect x="92" y="438" width="150" height="78" rx="12" class="repeat"/>
  <rect x="265" y="438" width="150" height="78" rx="12" class="repeat"/>
  <rect x="438" y="438" width="150" height="78" rx="12" class="repeat"/>
  <text x="340" y="545" text-anchor="middle" class="small">Repeated cards or repeated content pattern</text>

  <circle cx="658" cy="250" r="18" class="callout"/>
  <text x="658" y="256" text-anchor="middle" fill="#ffffff" class="label">1</text>
  <path d="M640 250 C620 250, 610 250, 588 250" class="line"/>
  <text x="690" y="246" class="label">Main message</text>
  <text x="690" y="268" class="small">What is the page trying to say first?</text>

  <circle cx="658" cy="368" r="18" class="callout"/>
  <text x="658" y="374" text-anchor="middle" fill="#ffffff" class="label">2</text>
  <path d="M640 368 C620 368, 610 368, 588 368" class="line"/>
  <text x="690" y="364" class="label">Second layer</text>
  <text x="690" y="386" class="small">What supports the main message?</text>

  <circle cx="658" cy="455" r="18" class="callout"/>
  <text x="658" y="461" text-anchor="middle" fill="#ffffff" class="label">3</text>
  <path d="M640 455 C620 455, 610 455, 588 455" class="line"/>
  <text x="690" y="451" class="label">Repeated areas</text>
  <text x="690" y="473" class="small">Which blocks follow the same pattern?</text>

  <circle cx="658" cy="520" r="18" class="callout"/>
  <text x="658" y="526" text-anchor="middle" fill="#ffffff" class="label">4</text>
  <path d="M640 520 C620 520, 610 520, 588 520" class="line"/>
  <text x="690" y="516" class="label">Global structure</text>
  <text x="690" y="538" class="small">Where does the page finish?</text>

  <rect x="92" y="528" width="496" height="18" rx="8" class="footer"/>
</svg>
