<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" role="img" aria-labelledby="title desc">
  <title id="title">Pattern system board</title>
  <desc id="desc">A simple board groups reusable CSS patterns into section-level patterns and repeated pieces such as cards, actions, and link groups.</desc>
  <defs><style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}.title{font-size:28px;font-weight:700}.subtitle{font-size:16px;fill:#52606d}.label{font-size:16px;font-weight:700}.small{font-size:13px;fill:#52606d}.panel{fill:#fff;stroke:#cbd2d9;stroke-width:2}.tile{fill:#f0f4f8;stroke:#9aa5b1;stroke-width:1.5}
  </style></defs>
  <rect width="960" height="440" fill="#f8fafb"/>
  <text x="60" y="56" class="title">Small CSS System Board</text>
  <text x="60" y="84" class="subtitle">Start with a few stable patterns instead of styling each section from scratch.</text>
  <rect x="80" y="120" width="360" height="250" rx="16" class="panel"/><text x="260" y="154" text-anchor="middle" class="label">Section patterns</text>
  <rect x="112" y="184" width="296" height="38" rx="10" class="tile"/><text x="132" y="208" class="small">Container</text>
  <rect x="112" y="234" width="296" height="38" rx="10" class="tile"/><text x="132" y="258" class="small">Section spacing</text>
  <rect x="112" y="284" width="296" height="38" rx="10" class="tile"/><text x="132" y="308" class="small">Section title and intro</text>
  <rect x="520" y="120" width="360" height="250" rx="16" class="panel"/><text x="700" y="154" text-anchor="middle" class="label">Repeated pieces</text>
  <rect x="552" y="184" width="296" height="38" rx="10" class="tile"/><text x="572" y="208" class="small">Card shell</text>
  <rect x="552" y="234" width="296" height="38" rx="10" class="tile"/><text x="572" y="258" class="small">Card grid</text>
  <rect x="552" y="284" width="296" height="38" rx="10" class="tile"/><text x="572" y="308" class="small">Button and link groups</text>
</svg>
