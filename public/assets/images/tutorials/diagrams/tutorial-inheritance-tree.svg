<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" role="img" aria-labelledby="title desc">
  <title id="title">CSS inheritance: which properties pass from parent to child</title>
  <desc id="desc">A tree diagram showing a body element at the top with font-family and color set. Arrows flow down to a
    section, then to a paragraph and a heading. The paragraph inherits both properties. A separate branch shows a div
    with border set, and a child paragraph that does NOT inherit the border, illustrating that layout properties do not
    inherit.</desc>
  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #1f2933
      }

      .heading {
        font-size: 24px;
        font-weight: 700
      }

      .subtitle {
        font-size: 15px;
        fill: #52606d
      }

      .label {
        font-size: 15px;
        font-weight: 700
      }

      .small {
        font-size: 13px;
        fill: #52606d
      }

      .code {
        font-family: "SF Mono", SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 13px;
        fill: #1f2933
      }

      .el-box {
        fill: #fff;
        stroke: #7b8794;
        stroke-width: 2;
        rx: 10
      }

      .inherits {
        fill: #e8f5e9;
        stroke: #2e7d32;
        stroke-width: 2;
        rx: 10
      }

      .no-inherit {
        fill: #fce4ec;
        stroke: #c62828;
        stroke-width: 2;
        rx: 10
      }

      .connector {
        fill: none;
        stroke: #9aa5b1;
        stroke-width: 1.5
      }

      .arrow-yes {
        fill: none;
        stroke: #2e7d32;
        stroke-width: 2;
        marker-end: url(#yes)
      }

      .arrow-no {
        fill: none;
        stroke: #c62828;
        stroke-width: 2;
        stroke-dasharray: 6 4;
        marker-end: url(#no)
      }

      .tag-yes {
        font-size: 12px;
        font-weight: 700;
        fill: #2e7d32
      }

      .tag-no {
        font-size: 12px;
        font-weight: 700;
        fill: #c62828
      }
    </style>
    <marker id="yes" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2e7d32" />
    </marker>
    <marker id="no" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c62828" />
    </marker>
  </defs>

  <rect width="960" height="440" fill="#f8fafb" />
  <text x="480" y="38" text-anchor="middle" class="heading">Inheritance: What Passes Down?</text>
  <text x="480" y="62" text-anchor="middle" class="subtitle">Text-related properties inherit. Layout and box properties
    do not.</text>

  <!-- LEFT TREE: inheriting properties -->
  <text x="240" y="96" text-anchor="middle" class="label" style="fill:#2e7d32">Properties that inherit ✓</text>

  <!-- body -->
  <rect x="140" y="110" width="200" height="56" class="el-box" />
  <text x="160" y="133" class="code">&lt;body&gt;</text>
  <text x="160" y="152" class="code" style="fill:#52606d">font-family: Georgia;</text>

  <!-- arrow to section -->
  <path d="M 240 166 L 240 190" class="arrow-yes" />

  <!-- section -->
  <rect x="140" y="190" width="200" height="42" class="inherits" />
  <text x="160" y="216" class="code">&lt;section&gt;</text>
  <text x="302" y="216" class="tag-yes">inherits font ✓</text>

  <!-- arrow to p -->
  <path d="M 200 232 L 200 260" class="arrow-yes" />
  <!-- arrow to h2 -->
  <path d="M 280 232 L 280 260" class="arrow-yes" />

  <!-- p -->
  <rect x="100" y="260" width="140" height="42" class="inherits" />
  <text x="116" y="286" class="code">&lt;p&gt;</text>
  <text x="148" y="286" class="tag-yes">inherits ✓</text>

  <!-- h2 -->
  <rect x="260" y="260" width="140" height="42" class="inherits" />
  <text x="276" y="286" class="code">&lt;h2&gt;</text>
  <text x="312" y="286" class="tag-yes">inherits ✓</text>

  <!-- RIGHT TREE: non-inheriting properties -->
  <text x="680" y="96" text-anchor="middle" class="label" style="fill:#c62828">Properties that do NOT inherit ✗</text>

  <!-- div with border -->
  <rect x="580" y="110" width="200" height="56" class="el-box" />
  <text x="600" y="133" class="code">&lt;div&gt;</text>
  <text x="600" y="152" class="code" style="fill:#52606d">border: 2px solid red;</text>

  <!-- arrow to child p -->
  <path d="M 680 166 L 680 200" class="arrow-no" />

  <!-- p no inherit -->
  <rect x="580" y="200" width="200" height="42" class="no-inherit" />
  <text x="600" y="226" class="code">&lt;p&gt;</text>
  <text x="636" y="226" class="tag-no">no border ✗</text>

  <!-- div with padding -->
  <rect x="580" y="266" width="200" height="56" class="el-box" />
  <text x="600" y="289" class="code">&lt;div&gt;</text>
  <text x="600" y="308" class="code" style="fill:#52606d">padding: 2rem;</text>

  <!-- arrow to child p -->
  <path d="M 680 322 L 680 350" class="arrow-no" />

  <!-- p no inherit -->
  <rect x="580" y="350" width="200" height="42" class="no-inherit" />
  <text x="600" y="376" class="code">&lt;p&gt;</text>
  <text x="636" y="376" class="tag-no">no padding ✗</text>

  <!-- Bottom summary -->
  <rect x="120" y="330" width="340" height="80" rx="8" fill="#f0f4f8" stroke="#9aa5b1" stroke-width="1.5" />
  <text x="140" y="354" class="small" style="font-weight:700">Inherits by default:</text>
  <text x="140" y="372" class="code">color, font-family, font-size,</text>
  <text x="140" y="390" class="code">line-height, letter-spacing, text-align</text>
</svg>