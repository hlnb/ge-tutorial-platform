<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Automated and manual testing balance</title>
  <desc id="desc">A split diagram showing automated tools on one side and manual checks on the other, both contributing evidence to a launch decision.</desc>
  <rect width="960" height="540" fill="#f8fafb"/>
  <text x="480" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#102a43">Tools Find Signals. People Check Meaning.</text>
  <text x="480" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#52606d">A strong QA pass combines automated audits with real interaction checks.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#486581"/>
    </marker>
  </defs>

  <rect x="80" y="135" width="350" height="290" rx="18" fill="#ffffff" stroke="#bcccdc" stroke-width="2"/>
  <rect x="530" y="135" width="350" height="290" rx="18" fill="#ffffff" stroke="#bcccdc" stroke-width="2"/>
  <rect x="320" y="455" width="320" height="54" rx="27" fill="#fff7ed" stroke="#f0b429" stroke-width="2"/>

  <text x="255" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#102a43">Automated Checks</text>
  <text x="705" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#102a43">Manual Checks</text>
  <text x="480" y="489" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#102a43">Launch decision with evidence</text>

  <g font-family="Arial, sans-serif" font-size="17" fill="#52606d">
    <circle cx="125" cy="224" r="8" fill="#2f80ed"/>
    <text x="145" y="230">HTML validation</text>
    <circle cx="125" cy="270" r="8" fill="#2f80ed"/>
    <text x="145" y="276">CSS warnings and ignored rules</text>
    <circle cx="125" cy="316" r="8" fill="#2f80ed"/>
    <text x="145" y="322">Lighthouse performance signals</text>
    <circle cx="125" cy="362" r="8" fill="#2f80ed"/>
    <text x="145" y="368">Common accessibility failures</text>

    <circle cx="575" cy="224" r="8" fill="#2f855a"/>
    <text x="595" y="230">Can users follow the page?</text>
    <circle cx="575" cy="270" r="8" fill="#2f855a"/>
    <text x="595" y="276">Does keyboard navigation work?</text>
    <circle cx="575" cy="316" r="8" fill="#2f855a"/>
    <text x="595" y="322">Do forms and links feel clear?</text>
    <circle cx="575" cy="362" r="8" fill="#2f855a"/>
    <text x="595" y="368">Does the content make sense?</text>
  </g>

  <path d="M255 425 C255 455 330 470 362 470" fill="none" stroke="#486581" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M705 425 C705 455 630 470 598 470" fill="none" stroke="#486581" stroke-width="4" marker-end="url(#arrow)"/>

  <line x1="480" y1="130" x2="480" y2="430" stroke="#d9e2ec" stroke-width="2" stroke-dasharray="8 10"/>
  <text x="480" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#829ab1">Both matter</text>
</svg>
