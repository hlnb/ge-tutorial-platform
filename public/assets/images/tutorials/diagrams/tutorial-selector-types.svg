<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">CSS selector types: from basic to precise</title>
  <desc id="desc">A visual table showing five selector categories — element, class, attribute, child/sibling combinator,
    and pseudo-class — each with a CSS example and a simplified DOM diagram highlighting what it matches.</desc>
  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #1f2933
      }

      .heading {
        font-size: 22px;
        font-weight: 700
      }

      .subtitle {
        font-size: 14px;
        fill: #52606d
      }

      .label {
        font-size: 15px;
        font-weight: 700
      }

      .small {
        font-size: 12px;
        fill: #52606d
      }

      .code {
        font-family: "SF Mono", "Fira Code", Consolas, monospace;
        font-size: 14px;
        fill: #8f2f23
      }

      .row-box {
        fill: #fff;
        stroke: #7b8794;
        stroke-width: 1.5;
        rx: 10
      }

      .matched {
        fill: #e6f7ee;
        stroke: #2d6a4f;
        stroke-width: 2;
        rx: 6
      }

      .unmatched {
        fill: #f0f4f8;
        stroke: #c9d1d9;
        stroke-width: 1;
        rx: 6
      }

      .cat-badge {
        rx: 4
      }

      .cat-text {
        font-size: 11px;
        font-weight: 600;
        fill: #fff
      }

      .arrow-line {
        stroke: #8f2f23;
        stroke-width: 1.5;
        stroke-dasharray: 4 2
      }

      .note {
        font-size: 13px;
        fill: #52606d;
        font-style: italic
      }
    </style>
  </defs>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" class="heading">CSS Selector Types: From Broad to Precise</text>
  <text x="480" y="56" text-anchor="middle" class="subtitle">Each selector type gives you a different level of control
    over which elements are targeted</text>

  <!-- Row 1: Element selector -->
  <rect x="30" y="76" width="900" height="80" class="row-box" />
  <rect x="46" y="92" width="80" height="22" fill="#3d85c6" class="cat-badge" />
  <text x="86" y="107" text-anchor="middle" class="cat-text">Element</text>
  <text x="160" y="107" class="code">p { }</text>
  <text x="160" y="128" class="small">Matches every &lt;p&gt; on the page</text>
  <!-- Mini DOM -->
  <rect x="440" y="88" width="60" height="28" class="unmatched" /><text x="470" y="107" text-anchor="middle"
    class="small">div</text>
  <rect x="520" y="88" width="50" height="28" class="matched" /><text x="545" y="107" text-anchor="middle"
    class="small">p</text>
  <rect x="590" y="88" width="50" height="28" class="matched" /><text x="615" y="107" text-anchor="middle"
    class="small">p</text>
  <rect x="660" y="88" width="60" height="28" class="unmatched" /><text x="690" y="107" text-anchor="middle"
    class="small">span</text>
  <rect x="740" y="88" width="50" height="28" class="matched" /><text x="765" y="107" text-anchor="middle"
    class="small">p</text>
  <text x="850" y="107" class="small" fill="#2d6a4f">3 matched</text>

  <!-- Row 2: Class selector -->
  <rect x="30" y="170" width="900" height="80" class="row-box" />
  <rect x="46" y="186" width="80" height="22" fill="#6a3d9a" class="cat-badge" />
  <text x="86" y="201" text-anchor="middle" class="cat-text">Class</text>
  <text x="160" y="201" class="code">.warning { }</text>
  <text x="160" y="222" class="small">Matches elements with class="warning"</text>
  <rect x="440" y="182" width="70" height="28" class="unmatched" /><text x="475" y="201" text-anchor="middle"
    class="small">p</text>
  <rect x="530" y="182" width="90" height="28" class="matched" /><text x="575" y="201" text-anchor="middle"
    class="small">p.warning</text>
  <rect x="640" y="182" width="70" height="28" class="unmatched" /><text x="675" y="201" text-anchor="middle"
    class="small">div</text>
  <rect x="730" y="182" width="100" height="28" class="matched" /><text x="780" y="201" text-anchor="middle"
    class="small">li.warning</text>
  <text x="870" y="201" class="small" fill="#2d6a4f">2 matched</text>

  <!-- Row 3: Attribute selector -->
  <rect x="30" y="264" width="900" height="80" class="row-box" />
  <rect x="46" y="280" width="80" height="22" fill="#e67c00" class="cat-badge" />
  <text x="86" y="295" text-anchor="middle" class="cat-text">Attribute</text>
  <text x="160" y="295" class="code">[type="email"] { }</text>
  <text x="160" y="316" class="small">Matches by attribute value</text>
  <rect x="440" y="276" width="110" height="28" class="unmatched" /><text x="495" y="295" text-anchor="middle"
    class="small">input[text]</text>
  <rect x="570" y="276" width="110" height="28" class="matched" /><text x="625" y="295" text-anchor="middle"
    class="small">input[email]</text>
  <rect x="700" y="276" width="110" height="28" class="unmatched" /><text x="755" y="295" text-anchor="middle"
    class="small">input[tel]</text>
  <text x="850" y="295" class="small" fill="#2d6a4f">1 matched</text>

  <!-- Row 4: Combinator -->
  <rect x="30" y="358" width="900" height="80" class="row-box" />
  <rect x="46" y="374" width="100" height="22" fill="#2d6a4f" class="cat-badge" />
  <text x="96" y="389" text-anchor="middle" class="cat-text">Combinator</text>
  <text x="180" y="389" class="code">.card &gt; h2 { }</text>
  <text x="180" y="410" class="small">Direct child only — not nested deeper</text>
  <!-- Mini nested DOM -->
  <rect x="440" y="368" width="70" height="44" class="unmatched" rx="6" />
  <text x="475" y="384" text-anchor="middle" class="small">.card</text>
  <rect x="452" y="396" width="46" height="14" class="matched" rx="3" /><text x="475" y="407" text-anchor="middle"
    style="font-size:10px;fill:#2d6a4f">h2 ✓</text>
  <line x1="530" y1="390" x2="560" y2="390" class="arrow-line" />
  <rect x="560" y="368" width="70" height="44" class="unmatched" rx="6" />
  <text x="595" y="384" text-anchor="middle" class="small">div</text>
  <rect x="572" y="396" width="46" height="14" class="unmatched" rx="3" /><text x="595" y="407" text-anchor="middle"
    style="font-size:10px;fill:#7b8794">h2 ✗</text>
  <text x="700" y="395" class="small" fill="#52606d">Only the direct child h2 matches</text>

  <!-- Row 5: Pseudo-class -->
  <rect x="30" y="452" width="900" height="80" class="row-box" />
  <rect x="46" y="468" width="100" height="22" fill="#8f2f23" class="cat-badge" />
  <text x="96" y="483" text-anchor="middle" class="cat-text">Pseudo-class</text>
  <text x="180" y="483" class="code">a:hover { }</text>
  <text x="180" y="504" class="small">Matches a state, not a fixed attribute</text>
  <rect x="440" y="464" width="60" height="28" class="unmatched" /><text x="470" y="483" text-anchor="middle"
    class="small">a</text>
  <rect x="520" y="464" width="100" height="28" class="matched" stroke-dasharray="4 2" /><text x="570" y="483"
    text-anchor="middle" class="small">a (hovered)</text>
  <rect x="640" y="464" width="60" height="28" class="unmatched" /><text x="670" y="483" text-anchor="middle"
    class="small">a</text>
  <text x="760" y="483" class="small" fill="#52606d">Only during interaction</text>

  <!-- Footer annotation -->
  <text x="480" y="548" text-anchor="middle" class="note">Classes and pseudo-classes score the same in specificity
    (column B). Combinators add no specificity.</text>
</svg>