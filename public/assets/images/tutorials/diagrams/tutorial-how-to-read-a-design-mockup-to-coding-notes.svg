<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" role="img" aria-labelledby="title desc">
  <title id="title">Mockup to coding notes diagram</title>
  <desc id="desc">A split diagram shows a marked-up mockup on the left and a list of implementation notes on the right, illustrating how design observations become practical build notes.</desc>
  <defs><style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}.title{font-size:28px;font-weight:700}.subtitle{font-size:16px;fill:#52606d}.label{font-size:18px;font-weight:700}.small{font-size:14px;fill:#52606d}.panel{fill:#fff;stroke:#cbd2d9;stroke-width:2}.a{fill:#dce8f7;stroke:#486581;stroke-width:2}.b{fill:#e7f3ea;stroke:#527a59;stroke-width:2}.c{fill:#f7eadb;stroke:#9c6b30;stroke-width:2}.note{fill:#f0f4f8;stroke:#cbd2d9;stroke-width:1.5}.line{stroke:#486581;stroke-width:2.5;fill:none;marker-end:url(#m)}
  </style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#486581"/></marker></defs>
  <rect width="960" height="440" fill="#f8fafb"/>
  <text x="60" y="56" class="title">From Mockup Clues to Coding Notes</text>
  <text x="60" y="84" class="subtitle">Good design reading ends with notes you can actually build from.</text>
  <rect x="60" y="120" width="360" height="260" rx="16" class="panel"/>
  <text x="240" y="154" text-anchor="middle" class="label">Marked-up design</text>
  <rect x="90" y="176" width="300" height="24" rx="8" class="a"/><rect x="90" y="212" width="300" height="56" rx="12" class="b"/><rect x="90" y="282" width="92" height="52" rx="10" class="c"/><rect x="194" y="282" width="92" height="52" rx="10" class="c"/><rect x="298" y="282" width="92" height="52" rx="10" class="c"/>
  <circle cx="112" cy="190" r="12" fill="#486581"/><text x="112" y="195" text-anchor="middle" fill="#fff" class="small">1</text>
  <circle cx="370" cy="224" r="12" fill="#486581"/><text x="370" y="229" text-anchor="middle" fill="#fff" class="small">2</text>
  <circle cx="194" cy="356" r="12" fill="#486581"/><text x="194" y="361" text-anchor="middle" fill="#fff" class="small">3</text>
  <path d="M440 250H520" class="line"/>
  <rect x="540" y="120" width="320" height="260" rx="16" class="panel"/>
  <text x="700" y="154" text-anchor="middle" class="label">Implementation notes</text>
  <rect x="568" y="180" width="264" height="34" rx="10" class="note"/><text x="582" y="202" class="small">1. Shared container width across sections</text>
  <rect x="568" y="224" width="264" height="34" rx="10" class="note"/><text x="582" y="246" class="small">2. Hero is main message and first action</text>
  <rect x="568" y="268" width="264" height="34" rx="10" class="note"/><text x="582" y="290" class="small">3. Repeated cards suggest shared card class</text>
  <rect x="568" y="312" width="264" height="34" rx="10" class="note"/><text x="582" y="334" class="small">4. Gallery probably needs a grid layout</text>
</svg>
