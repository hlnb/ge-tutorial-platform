<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Small multi-page site map</title>
  <desc id="desc">A diagram showing a homepage linked to menu, about, and contact pages through shared navigation.</desc>
  <defs>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}.title{font-size:28px;font-weight:700}.subtitle{font-size:16px;fill:#52606d}.label{font-size:17px;font-weight:700}.small{font-size:13px;fill:#52606d}.page{fill:#fff;stroke:#cbd2d9;stroke-width:2}.home{fill:#d6e8ef;stroke:#4b88a2;stroke-width:2.5}.nav{fill:#fff4d6;stroke:#d89b2b;stroke-width:2}.line{stroke:#4b88a2;stroke-width:3;fill:none}
    </style>
  </defs>
  <rect width="960" height="430" fill="#f8fafb"/>
  <text x="60" y="54" class="title">Start with a Site Map</text>
  <text x="60" y="82" class="subtitle">Plan the pages and the shared navigation before creating files.</text>

  <rect x="360" y="122" width="240" height="92" rx="18" class="home"/>
  <text x="480" y="158" text-anchor="middle" class="label">Home</text>
  <text x="480" y="183" text-anchor="middle" class="small">Overview and main entry point</text>

  <rect x="95" y="292" width="210" height="78" rx="16" class="page"/>
  <text x="200" y="324" text-anchor="middle" class="label">Menu</text>
  <text x="200" y="348" text-anchor="middle" class="small">Food and drink details</text>

  <rect x="375" y="292" width="210" height="78" rx="16" class="page"/>
  <text x="480" y="324" text-anchor="middle" class="label">About</text>
  <text x="480" y="348" text-anchor="middle" class="small">Story and values</text>

  <rect x="655" y="292" width="210" height="78" rx="16" class="page"/>
  <text x="760" y="324" text-anchor="middle" class="label">Contact</text>
  <text x="760" y="348" text-anchor="middle" class="small">Bookings and location</text>

  <path d="M425 214 L230 292" class="line"/>
  <path d="M480 214 L480 292" class="line"/>
  <path d="M535 214 L730 292" class="line"/>

  <rect x="313" y="235" width="334" height="36" rx="18" class="nav"/>
  <text x="480" y="258" text-anchor="middle" class="small">Shared nav: Home | Menu | About | Contact</text>
</svg>
