<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Domain and DNS path to a hosted website</title>
  <desc id="desc">A diagram showing a visitor typing a domain, DNS resolving the destination, the hosting platform receiving the request, and website files being served.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2f4858"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#172a3a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1120" height="520" rx="28" fill="#f8fafb"/>
  <text x="560" y="56" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="700" fill="#172a3a">A domain is a name. DNS is the pointing system.</text>
  <text x="560" y="92" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" fill="#52606d">The visitor uses a friendly address; DNS tells the browser where the hosted site lives.</text>

  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g filter="url(#shadow)">
      <rect x="70" y="176" width="210" height="164" rx="18" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
      <text x="175" y="222" text-anchor="middle" font-size="22" font-weight="700" fill="#172a3a">Visitor</text>
      <rect x="112" y="252" width="126" height="42" rx="21" fill="#e0f2fe"/>
      <text x="175" y="280" text-anchor="middle" font-size="16" font-weight="650" fill="#0369a1">example.com</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="340" y="176" width="210" height="164" rx="18" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
      <text x="445" y="222" text-anchor="middle" font-size="22" font-weight="700" fill="#172a3a">DNS</text>
      <text x="445" y="260" text-anchor="middle" font-size="16" fill="#52606d">A / CNAME records</text>
      <text x="445" y="290" text-anchor="middle" font-size="16" fill="#52606d">point to the host</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="610" y="176" width="210" height="164" rx="18" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
      <text x="715" y="222" text-anchor="middle" font-size="22" font-weight="700" fill="#172a3a">Hosting platform</text>
      <text x="715" y="260" text-anchor="middle" font-size="16" fill="#52606d">Netlify, Vercel,</text>
      <text x="715" y="290" text-anchor="middle" font-size="16" fill="#52606d">GitHub Pages, etc.</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="880" y="176" width="170" height="164" rx="18" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
      <text x="965" y="222" text-anchor="middle" font-size="22" font-weight="700" fill="#172a3a">Site files</text>
      <text x="965" y="260" text-anchor="middle" font-size="16" fill="#52606d">index.html</text>
      <text x="965" y="290" text-anchor="middle" font-size="16" fill="#52606d">CSS, JS, images</text>
    </g>
  </g>

  <g stroke="#2f4858" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M290 258 H328"/>
    <path d="M560 258 H598"/>
    <path d="M830 258 H868"/>
  </g>

  <rect x="256" y="388" width="608" height="58" rx="29" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="560" y="424" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="650" fill="#9a3412">Do not guess DNS values. Copy the current records from the host's domain instructions.</text>
</svg>
