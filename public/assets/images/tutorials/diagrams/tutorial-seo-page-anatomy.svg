<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">SEO page anatomy</title>
  <desc id="desc">An annotated web page mockup showing title, meta description, heading hierarchy, helpful body content, images with alt text, internal links, and structured data.</desc>
  <rect width="960" height="540" fill="#f8fafb"/>
  <text x="480" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#102a43">A Search-Friendly Page Is Easy to Interpret</text>
  <text x="480" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#52606d">Good SEO starts with visible structure before it reaches metadata or schema.</text>

  <rect x="110" y="125" width="470" height="330" rx="18" fill="#ffffff" stroke="#bcccdc" stroke-width="2"/>
  <rect x="135" y="155" width="420" height="35" rx="8" fill="#e0f2fe"/>
  <text x="150" y="178" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#102a43">H1: Black Swan Bistro Menu</text>
  <rect x="135" y="210" width="260" height="24" rx="6" fill="#f0fdf4"/>
  <text x="150" y="228" font-family="Arial, sans-serif" font-size="14" fill="#102a43">H2: Seasonal dishes</text>
  <rect x="135" y="248" width="390" height="12" rx="6" fill="#d9e2ec"/>
  <rect x="135" y="270" width="360" height="12" rx="6" fill="#d9e2ec"/>
  <rect x="135" y="292" width="315" height="12" rx="6" fill="#d9e2ec"/>
  <rect x="135" y="326" width="150" height="78" rx="10" fill="#fff7ed" stroke="#f0b429"/>
  <text x="210" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#102a43">Image + alt</text>
  <rect x="310" y="326" width="215" height="18" rx="6" fill="#f0fdf4"/>
  <rect x="310" y="356" width="190" height="12" rx="6" fill="#d9e2ec"/>
  <rect x="310" y="378" width="170" height="12" rx="6" fill="#d9e2ec"/>
  <rect x="135" y="424" width="180" height="16" rx="8" fill="#e0f2fe"/>

  <g font-family="Arial, sans-serif" font-size="15" fill="#102a43">
    <rect x="650" y="135" width="210" height="42" rx="21" fill="#e0f2fe" stroke="#7cc4fa"/>
    <text x="755" y="162" text-anchor="middle">Title tag</text>
    <line x1="650" y1="156" x2="555" y2="172" stroke="#7cc4fa" stroke-width="3"/>

    <rect x="650" y="195" width="210" height="42" rx="21" fill="#f0fdf4" stroke="#86efac"/>
    <text x="755" y="222" text-anchor="middle">Meta description</text>
    <line x1="650" y1="216" x2="520" y2="248" stroke="#86efac" stroke-width="3"/>

    <rect x="650" y="255" width="210" height="42" rx="21" fill="#fff7ed" stroke="#f0b429"/>
    <text x="755" y="282" text-anchor="middle">Heading hierarchy</text>
    <line x1="650" y1="276" x2="555" y2="172" stroke="#f0b429" stroke-width="3"/>

    <rect x="650" y="315" width="210" height="42" rx="21" fill="#fef2f2" stroke="#f5b7b1"/>
    <text x="755" y="342" text-anchor="middle">Internal links</text>
    <line x1="650" y1="336" x2="315" y2="432" stroke="#f5b7b1" stroke-width="3"/>

    <rect x="650" y="375" width="210" height="42" rx="21" fill="#eef2ff" stroke="#c4b5fd"/>
    <text x="755" y="402" text-anchor="middle">JSON-LD schema</text>
    <line x1="650" y1="396" x2="525" y2="425" stroke="#c4b5fd" stroke-width="3"/>
  </g>
</svg>
