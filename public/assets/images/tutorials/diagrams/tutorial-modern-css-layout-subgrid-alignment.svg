<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">Subgrid aligns nested card content</title>
  <desc id="desc">A diagram comparing independent card rows with subgrid rows that align titles, descriptions, and actions across cards.</desc>
  <defs>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}.title{font-size:28px;font-weight:700}.subtitle{font-size:16px;fill:#52606d}.label{font-size:16px;font-weight:700}.small{font-size:13px;fill:#52606d}.panel{fill:#fff;stroke:#cbd2d9;stroke-width:2}.card{fill:#fff;stroke:#9aa5b1;stroke-width:2}.line{fill:#cbd2d9}.action{fill:#d6e8ef;stroke:#4b88a2;stroke-width:1.5}.track{stroke:#d89b2b;stroke-width:2;stroke-dasharray:6 6}.muted{stroke:#d9e2ec;stroke-width:2;stroke-dasharray:6 6}
    </style>
  </defs>
  <rect width="960" height="500" fill="#f8fafb"/>
  <text x="60" y="56" class="title">Subgrid Shares the Parent Tracks</text>
  <text x="60" y="84" class="subtitle">Use it when nested card content needs shared alignment across the grid.</text>

  <rect x="70" y="126" width="380" height="310" rx="16" class="panel"/>
  <text x="260" y="162" text-anchor="middle" class="label">Independent card rows</text>
  <rect x="112" y="205" width="130" height="174" rx="14" class="card"/>
  <rect x="135" y="232" width="80" height="16" rx="8" class="line"/>
  <rect x="135" y="270" width="58" height="48" rx="8" class="line"/>
  <rect x="135" y="340" width="72" height="20" rx="10" class="action"/>
  <rect x="278" y="205" width="130" height="174" rx="14" class="card"/>
  <rect x="301" y="232" width="80" height="40" rx="8" class="line"/>
  <rect x="301" y="296" width="58" height="24" rx="8" class="line"/>
  <rect x="301" y="334" width="72" height="20" rx="10" class="action"/>
  <line x1="104" y1="334" x2="416" y2="334" class="muted"/>
  <text x="260" y="408" text-anchor="middle" class="small">Actions drift when content heights differ</text>

  <rect x="510" y="126" width="380" height="310" rx="16" class="panel"/>
  <text x="700" y="162" text-anchor="middle" class="label">Subgrid row alignment</text>
  <line x1="545" y1="228" x2="855" y2="228" class="track"/>
  <line x1="545" y1="286" x2="855" y2="286" class="track"/>
  <line x1="545" y1="348" x2="855" y2="348" class="track"/>
  <rect x="552" y="205" width="130" height="174" rx="14" class="card"/>
  <rect x="575" y="232" width="80" height="16" rx="8" class="line"/>
  <rect x="575" y="292" width="58" height="38" rx="8" class="line"/>
  <rect x="575" y="352" width="72" height="20" rx="10" class="action"/>
  <rect x="718" y="205" width="130" height="174" rx="14" class="card"/>
  <rect x="741" y="232" width="80" height="40" rx="8" class="line"/>
  <rect x="741" y="292" width="58" height="24" rx="8" class="line"/>
  <rect x="741" y="352" width="72" height="20" rx="10" class="action"/>
  <text x="700" y="408" text-anchor="middle" class="small">Nested content follows shared tracks</text>
</svg>
