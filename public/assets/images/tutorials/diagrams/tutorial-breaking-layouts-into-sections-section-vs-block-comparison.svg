<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" role="img" aria-labelledby="title desc">
  <title id="title">Section versus internal block comparison</title>
  <desc id="desc">Two panels compare a correct structure with one section containing cards against an incorrect structure where each card is treated as a top-level section.</desc>
  <defs><style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}.title{font-size:28px;font-weight:700}.subtitle{font-size:16px;fill:#52606d}.label{font-size:18px;font-weight:700}.small{font-size:14px;fill:#52606d}.panel{fill:#fff;stroke:#cbd2d9;stroke-width:2}.good{fill:#e7f3ea;stroke:#527a59;stroke-width:2}.bad{fill:#f6dfe4;stroke:#b44d6e;stroke-width:2}.card{fill:#f7eadb;stroke:#9c6b30;stroke-width:2}
  </style></defs>
  <rect width="960" height="460" fill="#f8fafb"/>
  <text x="60" y="56" class="title">Section or Internal Block?</text>
  <text x="60" y="84" class="subtitle">Not every visible box needs to become a top-level section.</text>
  <rect x="60" y="120" width="390" height="280" rx="16" class="panel"/>
  <text x="255" y="154" text-anchor="middle" class="label">Correct</text>
  <rect x="100" y="182" width="310" height="150" rx="16" class="good"/>
  <text x="255" y="210" text-anchor="middle" class="small">One featured dishes section</text>
  <rect x="126" y="236" width="82" height="64" rx="12" class="card"/><rect x="214" y="236" width="82" height="64" rx="12" class="card"/><rect x="302" y="236" width="82" height="64" rx="12" class="card"/>
  <text x="255" y="358" text-anchor="middle" class="small">Cards stay inside the parent section.</text>
  <rect x="510" y="120" width="390" height="280" rx="16" class="panel"/>
  <text x="705" y="154" text-anchor="middle" class="label">Incorrect</text>
  <rect x="550" y="190" width="90" height="110" rx="14" class="bad"/><rect x="660" y="190" width="90" height="110" rx="14" class="bad"/><rect x="770" y="190" width="90" height="110" rx="14" class="bad"/>
  <text x="705" y="326" text-anchor="middle" class="small">Each card becomes its own top-level section.</text>
  <text x="705" y="350" text-anchor="middle" class="small">That usually makes HTML noisy and unclear.</text>
</svg>
