<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Deployment workflow from local project to live website</title>
  <desc id="desc">A four step workflow showing local files, deployment, live URL testing, and continuous improvement.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2f4858"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#172a3a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1120" height="520" rx="28" fill="#f8fafb"/>
  <text x="560" y="56" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="700" fill="#172a3a">Deployment turns local work into a tested live site</text>
  <text x="560" y="92" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" fill="#52606d">The useful habit is the loop: publish, test, learn, improve.</text>

  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g filter="url(#shadow)">
      <rect x="58" y="160" width="210" height="180" rx="18" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
      <circle cx="163" cy="216" r="38" fill="#e0f2fe"/>
      <path d="M139 216 h48 M148 198 h30 M148 234 h30" stroke="#0369a1" stroke-width="8" stroke-linecap="round"/>
      <text x="163" y="284" text-anchor="middle" font-size="22" font-weight="700" fill="#172a3a">Local project</text>
      <text x="163" y="313" text-anchor="middle" font-size="16" fill="#52606d">HTML, CSS, JS, images</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="328" y="160" width="210" height="180" rx="18" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
      <circle cx="433" cy="216" r="38" fill="#fef3c7"/>
      <path d="M413 222 l18 18 l34 -48" fill="none" stroke="#b45309" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="433" y="284" text-anchor="middle" font-size="22" font-weight="700" fill="#172a3a">Deploy</text>
      <text x="433" y="313" text-anchor="middle" font-size="16" fill="#52606d">Upload or build from Git</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="598" y="160" width="210" height="180" rx="18" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
      <circle cx="703" cy="216" r="38" fill="#dcfce7"/>
      <path d="M674 216 h58 M703 187 v58" stroke="#15803d" stroke-width="8" stroke-linecap="round"/>
      <text x="703" y="284" text-anchor="middle" font-size="22" font-weight="700" fill="#172a3a">Live URL</text>
      <text x="703" y="313" text-anchor="middle" font-size="16" fill="#52606d">Someone else can open it</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="868" y="160" width="210" height="180" rx="18" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
      <circle cx="973" cy="216" r="38" fill="#ede9fe"/>
      <path d="M954 216 a22 22 0 1 0 8 -17 M962 199 v-20 M962 199 h-20" fill="none" stroke="#6d28d9" stroke-width="8" stroke-linecap="round"/>
      <text x="973" y="284" text-anchor="middle" font-size="22" font-weight="700" fill="#172a3a">Improve</text>
      <text x="973" y="313" text-anchor="middle" font-size="16" fill="#52606d">Fix, redeploy, retest</text>
    </g>
  </g>

  <g stroke="#2f4858" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M278 250 H316"/>
    <path d="M548 250 H586"/>
    <path d="M818 250 H856"/>
  </g>
  <path d="M976 356 C976 430 170 430 170 356" fill="none" stroke="#94a3b8" stroke-width="4" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <text x="560" y="462" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="650" fill="#334155">Deployment is healthiest when it becomes a repeatable loop, not a once-only panic.</text>
</svg>
