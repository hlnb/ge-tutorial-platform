<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Flexbox main axis and cross axis diagram</title>
  <desc id="desc">A flex container diagram shows the main axis running left to right and the cross axis running top to bottom, with three items aligned inside the container.</desc>
  <defs><style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}.title{font-size:28px;font-weight:700}.subtitle{font-size:16px;fill:#52606d}.label{font-size:16px;font-weight:700}.small{font-size:14px;fill:#52606d}.panel{fill:#fff;stroke:#cbd2d9;stroke-width:2}.item{fill:#dce8f7;stroke:#486581;stroke-width:2}.axis{stroke:#486581;stroke-width:3;fill:none;marker-end:url(#m)}
  </style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#486581"/></marker></defs>
  <rect width="960" height="420" fill="#f8fafb"/>
  <text x="60" y="56" class="title">Think in Axes, Not Just Rows</text>
  <text x="60" y="84" class="subtitle">Properties make more sense when you know which direction is the main one.</text>
  <rect x="120" y="140" width="560" height="180" rx="16" class="panel"/>
  <rect x="180" y="194" width="88" height="72" rx="12" class="item"/><rect x="356" y="194" width="88" height="72" rx="12" class="item"/><rect x="532" y="194" width="88" height="72" rx="12" class="item"/>
  <path d="M160 170H640" class="axis"/><text x="402" y="160" text-anchor="middle" class="label">Main axis</text>
  <path d="M720 300V162" class="axis"/><text x="744" y="236" class="label">Cross axis</text>
  <text x="720" y="336" class="small">justify-content works along the main axis</text>
  <text x="720" y="360" class="small">align-items works across the cross axis</text>
</svg>
