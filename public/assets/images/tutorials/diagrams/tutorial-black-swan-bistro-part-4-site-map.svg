<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" role="img" aria-labelledby="title desc">
  <title id="title">Black Swan Bistro multi-page site map</title>
  <desc id="desc">A site map showing the four pages of the Black Swan Bistro website: Home, Menu, About, and Contact,
    connected by navigation arrows to illustrate how pages link to each other.</desc>
  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #1f2933
      }

      .heading {
        font-size: 24px;
        font-weight: 700
      }

      .subtitle {
        font-size: 15px;
        fill: #52606d
      }

      .label {
        font-size: 16px;
        font-weight: 700
      }

      .small {
        font-size: 13px;
        fill: #52606d
      }

      .page-box {
        fill: #fff;
        stroke: #7b8794;
        stroke-width: 2.5;
        rx: 14
      }

      .home-box {
        fill: #f7efe2;
        stroke: #8f2f23;
        stroke-width: 2.5;
        rx: 14
      }

      .arrow {
        fill: none;
        stroke: #8f2f23;
        stroke-width: 2;
        marker-end: url(#arrowhead)
      }

      .nav-bar {
        fill: #f0f4f8;
        stroke: #9aa5b1;
        stroke-width: 1.5;
        rx: 6
      }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8f2f23" />
    </marker>
  </defs>

  <rect width="960" height="440" fill="#f8fafb" />
  <text x="480" y="40" text-anchor="middle" class="heading">Site Map: Black Swan Bistro</text>
  <text x="480" y="64" text-anchor="middle" class="subtitle">Every page links to every other page through shared
    navigation.</text>

  <!-- Home page (centre top) -->
  <rect x="355" y="100" width="250" height="110" class="home-box" />
  <text x="480" y="138" text-anchor="middle" class="label">index.html</text>
  <text x="480" y="158" text-anchor="middle" class="small">Homepage</text>
  <rect x="380" y="170" width="200" height="24" class="nav-bar" />
  <text x="480" y="186" text-anchor="middle" class="small">Home · Menu · About · Contact</text>

  <!-- Menu page (left) -->
  <rect x="60" y="290" width="200" height="100" class="page-box" />
  <text x="160" y="328" text-anchor="middle" class="label">menu.html</text>
  <text x="160" y="350" text-anchor="middle" class="small">Full menu &amp; prices</text>
  <rect x="80" y="360" width="160" height="18" class="nav-bar" />
  <text x="160" y="374" text-anchor="middle" style="font-size:11px;fill:#52606d">Shared nav</text>

  <!-- About page (centre) -->
  <rect x="340" y="290" width="200" height="100" class="page-box" />
  <text x="440" y="328" text-anchor="middle" class="label">about.html</text>
  <text x="440" y="350" text-anchor="middle" class="small">Story &amp; team</text>
  <rect x="360" y="360" width="160" height="18" class="nav-bar" />
  <text x="440" y="374" text-anchor="middle" style="font-size:11px;fill:#52606d">Shared nav</text>

  <!-- Contact page (right) -->
  <rect x="620" y="290" width="200" height="100" class="page-box" />
  <text x="720" y="328" text-anchor="middle" class="label">contact.html</text>
  <text x="720" y="350" text-anchor="middle" class="small">Location &amp; booking</text>
  <rect x="640" y="360" width="160" height="18" class="nav-bar" />
  <text x="720" y="374" text-anchor="middle" style="font-size:11px;fill:#52606d">Shared nav</text>

  <!-- Arrows from home to subpages -->
  <path d="M 420 210 Q 300 250 200 290" class="arrow" />
  <path d="M 480 210 L 440 290" class="arrow" />
  <path d="M 540 210 Q 620 250 700 290" class="arrow" />

  <!-- Horizontal arrows between subpages -->
  <path d="M 260 340 L 340 340" class="arrow" />
  <path d="M 540 340 L 620 340" class="arrow" />
</svg>