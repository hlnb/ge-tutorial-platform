<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Token to interface map</title>
  <desc id="desc">A diagram maps CSS tokens for color, spacing, width, and radius to parts of an interface such as cards, buttons, sections, and page width.</desc>
  <defs><style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2933}.title{font-size:28px;font-weight:700}.subtitle{font-size:16px;fill:#52606d}.label{font-size:16px;font-weight:700}.small{font-size:13px;fill:#52606d}.panel{fill:#fff;stroke:#cbd2d9;stroke-width:2}.line{stroke:#486581;stroke-width:2.5;fill:none;marker-end:url(#m)}.chip{fill:#f0f4f8;stroke:#9aa5b1;stroke-width:1.5}.ui{fill:#fff;stroke:#486581;stroke-width:2}
  </style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#486581"/></marker></defs>
  <rect width="960" height="430" fill="#f8fafb"/>
  <text x="60" y="56" class="title">From Shared Tokens to Interface Decisions</text>
  <text x="60" y="84" class="subtitle">Tokens become useful when they control repeated parts of the page.</text>
  <rect x="80" y="120" width="260" height="240" rx="16" class="panel"/>
  <text x="210" y="154" text-anchor="middle" class="label">Tokens</text>
  <rect x="106" y="182" width="208" height="30" rx="10" class="chip"/><text x="122" y="202" class="small">--color-accent</text>
  <rect x="106" y="222" width="208" height="30" rx="10" class="chip"/><text x="122" y="242" class="small">--space-md</text>
  <rect x="106" y="262" width="208" height="30" rx="10" class="chip"/><text x="122" y="282" class="small">--content-width</text>
  <rect x="106" y="302" width="208" height="30" rx="10" class="chip"/><text x="122" y="322" class="small">--card-radius</text>
  <path d="M340 198H470" class="line"/><path d="M340 238H470" class="line"/><path d="M340 278H470" class="line"/><path d="M340 318H470" class="line"/>
  <rect x="490" y="120" width="340" height="240" rx="16" class="panel"/>
  <text x="660" y="154" text-anchor="middle" class="label">Interface</text>
  <rect x="526" y="184" width="84" height="32" rx="16" class="ui"/><text x="568" y="204" text-anchor="middle" class="small">Button</text>
  <rect x="642" y="174" width="132" height="60" rx="14" class="ui"/><text x="708" y="206" text-anchor="middle" class="small">Card shell</text>
  <rect x="526" y="264" width="248" height="34" rx="10" class="ui"/><text x="650" y="286" text-anchor="middle" class="small">Section spacing and width</text>
</svg>
