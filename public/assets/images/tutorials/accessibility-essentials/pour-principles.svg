<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">POUR principles supporting an accessible web experience</title>
  <desc id="desc">Four labelled blocks, Perceivable, Operable, Understandable, and Robust, support a top panel labelled Accessible Web Experience.</desc>
  <rect width="960" height="540" fill="#f7faf8"/>
  <rect x="70" y="56" width="820" height="96" rx="10" fill="#173f4f"/>
  <text x="480" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Accessible Web Experience</text>
  <text x="480" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#d9ecf0">People can find, use, understand, and rely on the page.</text>
  <g stroke="#173f4f" stroke-width="3">
    <line x1="210" y1="152" x2="210" y2="214"/>
    <line x1="390" y1="152" x2="390" y2="214"/>
    <line x1="570" y1="152" x2="570" y2="214"/>
    <line x1="750" y1="152" x2="750" y2="214"/>
  </g>
  <g font-family="Arial, sans-serif">
    <rect x="105" y="214" width="210" height="214" rx="10" fill="#d6e8ef" stroke="#23566b" stroke-width="2"/>
    <circle cx="210" cy="266" r="28" fill="#23566b"/>
    <text x="210" y="276" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff">P</text>
    <text x="210" y="319" text-anchor="middle" font-size="23" font-weight="700" fill="#173f4f">Perceivable</text>
    <text x="210" y="352" text-anchor="middle" font-size="16" fill="#27485a">Content can be noticed</text>
    <text x="210" y="376" text-anchor="middle" font-size="16" fill="#27485a">and understood.</text>
    <text x="210" y="411" text-anchor="middle" font-size="15" fill="#51636c">alt text - contrast - captions</text>
    <rect x="285" y="214" width="210" height="214" rx="10" fill="#e9f4dc" stroke="#5e7f36" stroke-width="2"/>
    <circle cx="390" cy="266" r="28" fill="#5e7f36"/>
    <text x="390" y="276" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff">O</text>
    <text x="390" y="319" text-anchor="middle" font-size="23" font-weight="700" fill="#304b18">Operable</text>
    <text x="390" y="352" text-anchor="middle" font-size="16" fill="#44562b">Controls can be reached</text>
    <text x="390" y="376" text-anchor="middle" font-size="16" fill="#44562b">and used.</text>
    <text x="390" y="411" text-anchor="middle" font-size="15" fill="#5d6d4f">keyboard - focus - timing</text>
    <rect x="465" y="214" width="210" height="214" rx="10" fill="#fff1c7" stroke="#a66c00" stroke-width="2"/>
    <circle cx="570" cy="266" r="28" fill="#a66c00"/>
    <text x="570" y="276" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff">U</text>
    <text x="570" y="319" text-anchor="middle" font-size="23" font-weight="700" fill="#6e4700">Understandable</text>
    <text x="570" y="352" text-anchor="middle" font-size="16" fill="#6b5324">The page makes sense</text>
    <text x="570" y="376" text-anchor="middle" font-size="16" fill="#6b5324">without detective work.</text>
    <text x="570" y="411" text-anchor="middle" font-size="15" fill="#725f3c">labels - errors - clear copy</text>
    <rect x="645" y="214" width="210" height="214" rx="10" fill="#f3e8ff" stroke="#6d4a8c" stroke-width="2"/>
    <circle cx="750" cy="266" r="28" fill="#6d4a8c"/>
    <text x="750" y="276" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff">R</text>
    <text x="750" y="319" text-anchor="middle" font-size="23" font-weight="700" fill="#4a2c63">Robust</text>
    <text x="750" y="352" text-anchor="middle" font-size="16" fill="#55415f">Structure works across</text>
    <text x="750" y="376" text-anchor="middle" font-size="16" fill="#55415f">tools and browsers.</text>
    <text x="750" y="411" text-anchor="middle" font-size="15" fill="#69566f">valid HTML - careful ARIA</text>
  </g>
  <rect x="155" y="458" width="650" height="38" rx="19" fill="#ffffff" stroke="#cad7d9"/>
  <text x="480" y="483" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#31434a">Accessibility is a structure, not a decoration added at the end.</text>
</svg>
